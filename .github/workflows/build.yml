name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Gradle build
        working-directory: backend
        run: ./gradlew --no-daemon assemble -x test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: |
          npm install --no-audit --no-fund --ignore-scripts
          npx ng build --configuration=production

  package:
    needs: [backend, frontend]
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build backend jar
        working-directory: backend
        run: ./gradlew --no-daemon bootJar -x test
      - name: Build frontend
        working-directory: frontend
        run: |
          npm install --no-audit --no-fund --ignore-scripts
          npx ng build --configuration=production
      - name: Stage backend + ui for electron
        shell: bash
        run: |
          mkdir -p resources/backend electron/app
          cp backend/build/libs/*.jar resources/backend/adm-backend.jar
          cp -R frontend/dist/frontend/browser/* electron/app/
      - name: Electron package
        working-directory: electron
        shell: bash
        run: |
          npm install --no-audit --no-fund
          npx electron-builder --publish never
